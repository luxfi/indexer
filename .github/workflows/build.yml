name: Build and Push
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: 1.26.1

jobs:
  test:
    runs-on: lux-build-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc libsqlite3-dev
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Refresh go.sum (proxy cache inconsistency)
        run: rm -f go.sum && GOSUMDB=off go mod download
        env:
          GOSUMDB: "off"
      - run: go test -race -count=1 ./...
        env:
          CGO_ENABLED: 1

  lint:
    runs-on: lux-build-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc libsqlite3-dev
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Refresh go.sum (proxy cache inconsistency)
        run: rm -f go.sum && GOSUMDB=off go mod download
        env:
          GOSUMDB: "off"
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
