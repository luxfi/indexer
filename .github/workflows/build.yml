name: Build and Push
on:
  workflow_dispatch: null
  push:
    branches:
    - main
    - hanzo-dev
    tags:
    - v*
  pull_request:
    branches:
    - main
env:
  GO_VERSION: 1.26.1
  REGISTRY: ghcr.io
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    - run: go mod download
    - run: go test -race -count=1 ./...
      env:
        CGO_ENABLED: 1
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    - run: go vet ./...
    - run: test -z "$(gofmt -l .)"
