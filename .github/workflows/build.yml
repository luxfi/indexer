name: Build and Push

on:
  workflow_dispatch:
  push:
    branches: [main, hanzo-dev]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.26.1'
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go test -race -count=1 ./...
        env:
          CGO_ENABLED: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"

  # Image 1: ghcr.io/luxfi/indexer — Go backend only (API + indexer)
  docker-indexer:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/luxfi/indexer
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=sha
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: VERSION=${{ github.ref_name }}

  # Image 2: ghcr.io/luxfi/explorer — Combined (backend + embedded frontend)
  docker-explorer:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/luxfi/explorer
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=sha
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.explorer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: VERSION=${{ github.ref_name }}

  release:
    runs-on: ubuntu-latest
    needs: [docker-indexer]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: |
          CGO_ENABLED=1 CGO_CFLAGS="-D_LARGEFILE64_SOURCE" GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o explorer-linux-amd64 ./cmd/explorer/
      - uses: softprops/action-gh-release@v1
        with:
          files: explorer-linux-amd64
          generate_release_notes: true
