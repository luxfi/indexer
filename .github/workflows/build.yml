name: Build and Push
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: 1.26.1

jobs:
  test:
    runs-on: lux-build-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Verify build deps
        run: |
          set -e
          command -v gcc || { echo "gcc not installed on runner"; exit 1; }
          # libsqlite3-dev provides sqlite3.h; mattn/go-sqlite3 vendors its own
          # sqlite C source, so the system header is not strictly required.
          gcc --version | head -1
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Refresh go.sum (proxy cache inconsistency)
        run: rm -f go.sum && GOSUMDB=off go mod download
        env:
          GOSUMDB: "off"
      - run: go test -race -count=1 ./...
        env:
          CGO_ENABLED: 1
          GOSUMDB: "off"

  lint:
    runs-on: lux-build-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Verify build deps
        run: |
          set -e
          command -v gcc || { echo "gcc not installed on runner"; exit 1; }
          # libsqlite3-dev provides sqlite3.h; mattn/go-sqlite3 vendors its own
          # sqlite C source, so the system header is not strictly required.
          gcc --version | head -1
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Refresh go.sum (proxy cache inconsistency)
        run: rm -f go.sum && GOSUMDB=off go mod download
        env:
          GOSUMDB: "off"
      - run: go vet ./...
        env:
          GOSUMDB: "off"
      - run: test -z "$(gofmt -l .)"
